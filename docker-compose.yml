services:
  jekyll:
    image: ruby:3.4-slim
    ports:
      - "4000:4000"
    volumes:
      - .:/site
      - bundle-cache:/usr/local/bundle
    working_dir: /site
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq build-essential git > /dev/null 2>&1 &&
        rm -f Gemfile.lock &&
        bundle install --quiet &&
        bundle exec jekyll serve --host 0.0.0.0 --watch --force_polling
      "

volumes:
  bundle-cache:
